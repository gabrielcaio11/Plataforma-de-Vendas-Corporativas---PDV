services:

  postgres:
    image: postgres:16-alpine
    container_name: pdv_postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pdv-backend-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pdv_spring_api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - pdv-backend-network
    restart: always

volumes:
  postgres_data:

networks:
  pdv-backend-network:
    driver: bridge